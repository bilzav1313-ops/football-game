<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer Hero TG</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f7a2d;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 10px;
    }

    #game {
      position: relative;
      width: 100%;
      max-width: 400px;
      height: 500px;
      margin: auto;
      background: #19a337;
      border: 4px solid white;
      border-radius: 20px;
      overflow: hidden;
    }

    #goal {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 70px;
      background: white;
      border-radius: 0 0 15px 15px;
    }

    #keeper {
      position: absolute;
      top: 60px;
      width: 50px;
      height: 50px;
      background: blue;
      border-radius: 50%;
      left: 175px;
      transition: left 0.3s;
    }

    #ball {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 30px;
      background: white;
      border-radius: 50%;
      border: 2px solid black;
      transition: all 0.5s;
    }

    .controls {
      margin-top: 15px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
    }

    #info {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>⚽ Soccer Hero</h1>

<div id="game">
  <div id="goal"></div>
  <div id="keeper"></div>
  <div id="ball"></div>
</div>

<div id="info">
  Очки: <span id="score">0</span> |
  Комбо: <span id="combo">0</span> |
  ⏱ Время: <span id="time">30</span>
</div>

<div class="controls">
  <button onclick="shoot('left')">⬅</button>
  <button onclick="shoot('center')">⬆</button>
  <button onclick="shoot('right')">➡</button>
</div>

<script>
  const ball = document.getElementById("ball");
  const keeper = document.getElementById("keeper");
  const scoreEl = document.getElementById("score");
  const comboEl = document.getElementById("combo");
  const timeEl = document.getElementById("time");

  let score = 0;
  let combo = 0;
  let timeLeft = 30;
  let playing = true;

  const timer = setInterval(() => {
    if (timeLeft <= 0) {
      playing = false;
      clearInterval(timer);
      alert("Игра окончена! Твой счёт: " + score);
      return;
    }
    timeLeft--;
    timeEl.textContent = timeLeft;
  }, 1000);

  function shoot(direction) {
    if (!playing) return;

    let targetX;
    if (direction === "left") targetX = 20;
    if (direction === "center") targetX = 50;
    if (direction === "right") targetX = 80;

    const keeperX = Math.random() * 70 + 10;
    keeper.style.left = keeperX + "%";

    ball.style.left = targetX + "%";
    ball.style.bottom = "420px";

    setTimeout(() => {
      const distance = Math.abs(keeperX - targetX);

      if (distance > 15) {
        combo++;
        const points = 10 + combo * 2;
        score += points;
      } else {
        combo = 0;
      }

      scoreEl.textContent = score;
      comboEl.textContent = combo;

      ball.style.bottom = "40px";
      ball.style.left = "50%";
    }, 500);
  }

  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
</script>

</body>
</html>
