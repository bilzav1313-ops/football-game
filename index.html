<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer Hero TG</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0e7a2f;
  color:white;
  text-align:center;
}

h1{ margin:10px 0; }

#game{
  position:relative;
  width:100%;
  max-width:400px;
  height:520px;
  margin:auto;
  background:#18a63a;
  border:4px solid white;
  border-radius:20px;
  overflow:hidden;
}

#goal{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:70%;
  height:80px;
  background:white;
  border-radius:0 0 20px 20px;
}

#keeper{
  position:absolute;
  top:65px;
  width:50px;
  height:50px;
  background:blue;
  border-radius:50%;
  left:175px;
  transition:left 0.3s;
}

#ball{
  position:absolute;
  bottom:50px;
  left:50%;
  transform:translateX(-50%);
  width:30px;
  height:30px;
  background:white;
  border-radius:50%;
  border:2px solid black;
  transition:all 0.4s ease;
}

#panel{
  margin-top:10px;
  font-size:16px;
}

.buttons{
  margin-top:15px;
}

button{
  padding:12px 18px;
  margin:5px;
  font-size:16px;
  border:none;
  border-radius:12px;
}
</style>
</head>
<body>

<h1>⚽ Soccer Hero</h1>

<div id="game">
  <div id="goal"></div>
  <div id="keeper"></div>
  <div id="ball"></div>
</div>

<div id="panel">
  Очки: <span id="score">0</span> |
  Комбо: <span id="combo">0</span> |
  ⏱ Время: <span id="time">30</span>
</div>

<div class="buttons">
  <button onclick="shoot('left')">⬅</button>
  <button onclick="shoot('center')">⬆</button>
  <button onclick="shoot('right')">➡</button>
</div>

<script>
Telegram.WebApp.ready();
Telegram.WebApp.expand();

let score = 0;
let combo = 0;
let timeLeft = 30;
let playing = true;

const ball = document.getElementById("ball");
const keeper = document.getElementById("keeper");
const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const timeEl = document.getElementById("time");

const timer = setInterval(()=>{
  if(timeLeft <= 0){
    playing = false;
    clearInterval(timer);
    alert("Игра окончена! Твой счёт: " + score);
    return;
  }
  timeLeft--;
  timeEl.textContent = timeLeft;
},1000);

function shoot(dir){
  if(!playing) return;

  let target;

  if(dir==="left") target = 15;
  if(dir==="center") target = 50;
  if(dir==="right") target = 85;

  const keeperPos = Math.random()*70+10;
  keeper.style.left = keeperPos+"%";

  ball.style.left = target+"%";
  ball.style.bottom = "440px";

  setTimeout(()=>{
    const diff = Math.abs(keeperPos-target);

    if(diff>15){
      combo++;
      let points = 10 + combo*2;
      score += points;
    }else{
      combo = 0;
    }

    scoreEl.textContent = score;
    comboEl.textContent = combo;

    ball.style.bottom = "50px";
    ball.style.left = "50%";
  },400);
}
</script>

</body>
</html>
