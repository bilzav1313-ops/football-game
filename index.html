<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football Star</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #00ff88; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #1a2a6c, #b21f1f, #fdbb2d); color: white; text-align: center; margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .stats { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-weight: bold; font-size: 1.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #ball { width: 180px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); cursor: pointer; transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275); user-select: none; }
        #ball:active { transform: scale(1.2) rotate(15deg); }
        .progress-container { width: 80%; background: rgba(255,255,255,0.2); height: 10px; border-radius: 5px; margin: 20px auto; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--main-color); transition: width 0.3s; }
        .lvl-badge { background: var(--main-color); color: black; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="stats">
        <div>ГОЛЫ: <span id="score">0</span></div>
        <div class="lvl-badge">LVL <span id="lvl">1</span></div>
    </div>

    <div class="game">
        <img id="ball" src="https://cdn-icons-png.flaticon.com/512/53/53283.png" alt="ball">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <p id="status">Стань легендой футбола!</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let score = 0;
        let lvl = 1;
        let nextLvl = 10;

        const ball = document.getElementById('ball');
        const scoreEl = document.getElementById('score');
        const lvlEl = document.getElementById('lvl');
        const progressEl = document.getElementById('progress-bar');

        ball.addEventListener('click', (e) => {
            score++;
            scoreEl.innerText = score;
            
            // Прогресс уровня
            let percent = (score / nextLvl) * 100;
            progressEl.style.width = percent + '%';

            if (score >= nextLvl) {
                lvl++;
                nextLvl *= 2; // Увеличиваем сложность
                lvlEl.innerText = lvl;
                tg.HapticFeedback.notificationOccurred('success');
                document.getElementById('status').innerText = "НОВЫЙ УРОВЕНЬ!";
                setTimeout(() => { document.getElementById('status').innerText = "Жми сильнее!"; }, 2000);
            }

            tg.HapticFeedback.impactOccurred('light');
        });
    </script>
</body>
</html>
