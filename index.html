<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penalty Master</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #field { width: 100vw; height: 100vh; background: linear-gradient(#4facfe 0%, #00f2fe 40%, #27ae60 40%, #2ecc71 100%); position: relative; }
        #gate { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 250px; height: 120px; border: 5px solid white; border-bottom: none; }
        #ball { 
            position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
            width: 60px; height: 60px; background: url('https://cdn-icons-png.flaticon.com/512/53/53283.png');
            background-size: cover; transition: all 0.5s ease-out; z-index: 10;
        }
        .score-board { position: absolute; top: 5%; width: 100%; text-align: center; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="field">
        <div class="score-board">СЧЕТ: <span id="score">0</span></div>
        <div id="gate"></div>
        <div id="ball"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const ball = document.getElementById('ball');
        const scoreEl = document.getElementById('score');
        let score = 0;
        let startY, startX;
        let isMoving = false;

        // Сенсорное управление
        document.addEventListener('touchstart', (e) => {
            if (isMoving) return;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            if (isMoving) return;
            let endX = e.changedTouches[0].clientX;
            let endY = e.changedTouches[0].clientY;

            // Расчет силы и направления свайпа
            let diffX = endX - startX;
            let diffY = endY - startY;

            if (diffY < -50) { // Если свайп вверх
                shoot(diffX, diffY);
            }
        });

        function shoot(x, y) {
            isMoving = true;
            ball.style.transition = "all 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67)";
            
            // Анимация полета мяча
            ball.style.bottom = "75%"; 
            ball.style.left = `calc(50% + ${x/2}px)`;
            ball.style.width = "30px";
            ball.style.height = "30px";

            // Проверка: попал в ворота или нет
            setTimeout(() => {
                let ballPos = ball.getBoundingClientRect();
                let gatePos = document.getElementById('gate').getBoundingClientRect();

                if (ballPos.left > gatePos.left && ballPos.right < gatePos.right) {
                    score++;
                    scoreEl.innerText = score;
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    tg.HapticFeedback.notificationOccurred('error');
                }

                // Возвращаем мяч назад
                setTimeout(resetBall, 1000);
            }, 600);
        }

        function resetBall() {
            ball.style.transition = "none";
            ball.style.bottom = "15%";
            ball.style.left = "50%";
            ball.style.width = "60px";
            ball.style.height = "60px";
            isMoving = false;
        }
    </script>
</body>
</html>
