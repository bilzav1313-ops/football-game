<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚽ Football Strike PS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{width:100%;height:100%;overflow:hidden;background:#050810;}
body{
  font-family:'Rajdhani',sans-serif;
  display:flex;flex-direction:column;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* ── HUD ── */
.hud{
  width:100%;max-width:500px;
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 14px;
  background:linear-gradient(180deg,#0b1320 0%,rgba(11,19,32,0) 100%);
  flex-shrink:0;
}
.score-area{display:flex;align-items:center;gap:6px;}
.score-num{font-family:'Bebas Neue';font-size:38px;color:#fff;line-height:1;}
.score-sep{font-family:'Bebas Neue';font-size:26px;color:#2a4060;line-height:1;}
.team-tag{font-size:10px;font-weight:700;letter-spacing:2px;color:#3a6080;text-transform:uppercase;}
.timer-area{text-align:center;}
.timer-num{font-family:'Bebas Neue';font-size:26px;color:#00e676;line-height:1;}
.timer-lbl{font-size:9px;letter-spacing:2px;color:#2a4060;text-transform:uppercase;}
.controlled-tag{
  font-size:9px;letter-spacing:1px;color:#ffd600;text-transform:uppercase;
  background:rgba(255,214,0,0.1);border:1px solid rgba(255,214,0,0.3);
  border-radius:4px;padding:2px 6px;margin-top:2px;text-align:center;
}

/* ── CANVAS ── */
.game-wrap{
  position:relative;
  width:100%;max-width:500px;
  flex:1;min-height:0;
  overflow:hidden;
}
canvas{display:block;width:100%;height:100%;}

/* OVERLAYS */
.overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(2,5,15,0.88);backdrop-filter:blur(6px);z-index:50;
}
.overlay.hidden{display:none;}
.ov-title{
  font-family:'Bebas Neue';font-size:56px;letter-spacing:5px;color:#00e676;
  text-shadow:0 0 40px #00e67666;animation:glow 2s infinite alternate;
}
@keyframes glow{from{text-shadow:0 0 20px #00e67644;}to{text-shadow:0 0 60px #00e676aa;}}
.ov-sub{font-size:15px;color:#4a7090;letter-spacing:3px;text-transform:uppercase;margin:6px 0 28px;}
.ov-hints{font-size:12px;color:#2a5070;text-align:center;line-height:2;margin-bottom:24px;}
.ov-hints span{color:#ffd600;}
.btn-play{
  font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;
  background:linear-gradient(135deg,#00e676,#00b0cc);
  color:#000;border:none;padding:13px 50px;border-radius:6px;cursor:pointer;
}
.btn-play:active{transform:scale(0.95);}

/* GOAL FLASH */
.goal-flash{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:40;opacity:0;transition:opacity 0.15s;
}
.goal-flash.show{opacity:1;}
.goal-txt{
  font-family:'Bebas Neue';font-size:80px;letter-spacing:8px;
  text-shadow:0 0 50px currentColor,0 4px 0 rgba(0,0,0,0.5);
  animation:goalBounce 0.3s ease;
}
@keyframes goalBounce{from{transform:scale(0.2)rotate(-15deg);}to{transform:scale(1)rotate(0)}}

/* ── PS CONTROLLER ── */
.controller{
  width:100%;max-width:500px;
  flex-shrink:0;
  padding:8px 10px 10px;
  background:linear-gradient(0deg,#080d18 60%,rgba(8,13,24,0) 100%);
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:8px;
}

/* D-PAD */
.dpad{
  position:relative;
  width:110px;height:110px;
  flex-shrink:0;
}
.dpad-btn{
  position:absolute;
  background:linear-gradient(145deg,#1a2540,#0e1828);
  border:1px solid #1e3050;
  color:#4a7090;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  cursor:pointer;
  transition:all 0.08s;
  -webkit-tap-highlight-color:transparent;
}
.dpad-btn:active,.dpad-btn.pressed{
  background:linear-gradient(145deg,#0e1828,#060c18);
  border-color:#00e676;color:#00e676;
  box-shadow:0 0 12px rgba(0,230,118,0.4);
}
.dpad-up{top:0;left:50%;transform:translateX(-50%);width:36px;height:36px;border-radius:6px 6px 2px 2px;}
.dpad-down{bottom:0;left:50%;transform:translateX(-50%);width:36px;height:36px;border-radius:2px 2px 6px 6px;}
.dpad-left{left:0;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:6px 2px 2px 6px;}
.dpad-right{right:0;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:2px 6px 6px 2px;}
.dpad-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(145deg,#0e1828,#060c18);
  border:1px solid #1a2a40;
}

/* CENTER BUTTONS */
.center-btns{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  flex:1;
}
.center-row{display:flex;gap:8px;align-items:center;}
.c-btn{
  font-family:'Rajdhani';font-size:9px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:#2a4060;
  background:linear-gradient(145deg,#0e1828,#060c18);
  border:1px solid #1a2a40;
  border-radius:20px;padding:5px 10px;cursor:pointer;
  transition:all 0.08s;
}
.c-btn:active{border-color:#3a5070;color:#4a7090;transform:scale(0.93);}

/* ACTION BUTTONS (right side - PS style) */
.action-btns{
  position:relative;
  width:110px;height:110px;
  flex-shrink:0;
}
.action-btn{
  position:absolute;
  width:36px;height:36px;border-radius:50%;
  border:none;cursor:pointer;
  font-family:'Bebas Neue';font-size:13px;letter-spacing:0.5px;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  transition:all 0.08s;
  box-shadow:0 4px 0 rgba(0,0,0,0.4);
  -webkit-tap-highlight-color:transparent;
  line-height:1;
}
.action-btn:active,.action-btn.pressed{
  transform:translateY(3px);
  box-shadow:0 1px 0 rgba(0,0,0,0.4);
  filter:brightness(1.3);
}
/* PS positions: triangle top, cross bottom, square left, circle right */
.btn-tri{top:0;left:50%;transform:translateX(-50%);background:#1a7060;color:#1fffd0;border:2px solid #0f5040;}
.btn-cross{bottom:0;left:50%;transform:translateX(-50%);background:#203070;color:#6080ff;border:2px solid #102060;}
.btn-square{left:0;top:50%;transform:translateY(-50%);background:#702040;color:#ff80b0;border:2px solid #501030;}
.btn-circle{right:0;top:50%;transform:translateY(-50%);background:#703010;color:#ffaa40;border:2px solid #502000;}
.btn-icon{font-size:16px;line-height:1;}
.btn-lbl{font-size:7px;letter-spacing:0.5px;line-height:1;margin-top:1px;opacity:0.8;}

/* SHOULDER BUTTONS */
.shoulders{
  width:100%;max-width:500px;
  display:flex;justify-content:space-between;
  padding:4px 10px;
  flex-shrink:0;
}
.shoulder-btn{
  font-family:'Rajdhani';font-size:10px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;
  background:linear-gradient(145deg,#1a2540,#0e1828);
  border:1px solid #1e3050;color:#3a6080;
  border-radius:6px;padding:6px 14px;cursor:pointer;
  transition:all 0.08s;
}
.shoulder-btn:active,.shoulder-btn.pressed{
  background:linear-gradient(145deg,#0e1828,#060c18);
  border-color:#ffd600;color:#ffd600;
  box-shadow:0 0 10px rgba(255,214,0,0.3);
}

/* POWER BAR */
.power-row{
  width:100%;max-width:500px;
  padding:3px 10px;
  flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
.power-lbl{font-size:10px;letter-spacing:1px;color:#2a4060;text-transform:uppercase;width:36px;}
.power-track{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
.power-fill{height:100%;width:0%;background:linear-gradient(90deg,#00e676,#ffd600 60%,#ff1744);border-radius:3px;transition:width 0.04s;}
.power-val{font-family:'Bebas Neue';font-size:14px;color:#3a6080;width:28px;text-align:right;}
</style>
</head>
<body>

<!-- HUD -->
<div class="hud">
  <div>
    <div class="team-tag">ТВОЯ</div>
    <div class="score-area">
      <div class="score-num" id="sP">0</div>
    </div>
  </div>
  <div class="timer-area">
    <div class="timer-num" id="clock">3:00</div>
    <div class="timer-lbl">Время</div>
  </div>
  <div style="text-align:right">
    <div class="team-tag">CPU</div>
    <div class="score-num" id="sC">0</div>
  </div>
</div>
<div style="width:100%;max-width:500px;padding:0 14px 2px;flex-shrink:0;">
  <div class="controlled-tag" id="ctrlTag">Управление: — нажми ▶ чтобы начать</div>
</div>

<!-- GAME CANVAS -->
<div class="game-wrap">
  <canvas id="gc"></canvas>

  <div class="overlay" id="ovStart">
    <div class="ov-title">FOOTBALL<br>STRIKE</div>
    <div class="ov-sub">PlayStation Edition</div>
    <div class="ov-hints">
      <span>△</span> Удар по воротам &nbsp;|&nbsp; <span>✕</span> Пас напарнику<br>
      <span>○</span> Смена игрока &nbsp;|&nbsp; <span>□</span> Подкат / Выбить<br>
      <span>D-pad</span> Движение &nbsp;|&nbsp; <span>L1</span> Навес<br>
    </div>
    <button class="btn-play" onclick="startGame()">▶ ИГРАТЬ</button>
  </div>

  <div class="overlay hidden" id="ovEnd">
    <div class="ov-title" id="endT">ФИНАЛ</div>
    <div class="ov-sub" id="endS"></div>
    <button class="btn-play" onclick="restartGame()">↺ СНОВА</button>
  </div>

  <div class="goal-flash" id="gFlash">
    <div class="goal-txt" id="gTxt">ГОЛ!</div>
  </div>
</div>

<!-- POWER BAR -->
<div class="power-row">
  <div class="power-lbl">Сила</div>
  <div class="power-track"><div class="power-fill" id="pwFill"></div></div>
  <div class="power-val" id="pwVal">0</div>
</div>

<!-- SHOULDER BUTTONS -->
<div class="shoulders">
  <button class="shoulder-btn" id="btnL1"
    ontouchstart="sh('L1',1)" ontouchend="sh('L1',0)"
    onmousedown="sh('L1',1)" onmouseup="sh('L1',0)">L1 НАВЕС</button>
  <button class="shoulder-btn" id="btnL2"
    ontouchstart="sh('L2',1)" ontouchend="sh('L2',0)"
    onmousedown="sh('L2',1)" onmouseup="sh('L2',0)">L2 СПРИНТ</button>
  <button class="shoulder-btn" id="btnR2"
    ontouchstart="sh('R2',1)" ontouchend="sh('R2',0)"
    onmousedown="sh('R2',1)" onmouseup="sh('R2',0)">R2 СПРИНТ</button>
  <button class="shoulder-btn" id="btnR1"
    ontouchstart="sh('R1',1)" ontouchend="sh('R1',0)"
    onmousedown="sh('R1',1)" onmouseup="sh('R1',0)">R1 ПРОСТРЕЛ</button>
</div>

<!-- CONTROLLER -->
<div class="controller">
  <!-- D-PAD -->
  <div class="dpad">
    <button class="dpad-btn dpad-up" id="dU"
      ontouchstart="dp('U',1)" ontouchend="dp('U',0)"
      onmousedown="dp('U',1)" onmouseup="dp('U',0)">▲</button>
    <button class="dpad-btn dpad-down" id="dD"
      ontouchstart="dp('D',1)" ontouchend="dp('D',0)"
      onmousedown="dp('D',1)" onmouseup="dp('D',0)">▼</button>
    <button class="dpad-btn dpad-left" id="dL"
      ontouchstart="dp('L',1)" ontouchend="dp('L',0)"
      onmousedown="dp('L',1)" onmouseup="dp('L',0)">◀</button>
    <button class="dpad-btn dpad-right" id="dR"
      ontouchstart="dp('R',1)" ontouchend="dp('R',0)"
      onmousedown="dp('R',1)" onmouseup="dp('R',0)">▶</button>
    <div class="dpad-center"></div>
  </div>

  <!-- CENTER -->
  <div class="center-btns">
    <div class="center-row">
      <button class="c-btn" onclick="startGame()">▶ СТАРТ</button>
    </div>
    <div style="font-size:9px;color:#1a2a40;letter-spacing:1px;text-transform:uppercase;margin-top:4px;">FOOTBALL STRIKE</div>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="action-btns">
    <!-- Triangle - top - SHOOT -->
    <button class="action-btn btn-tri" id="btnTri"
      ontouchstart="ab('tri',1)" ontouchend="ab('tri',0)"
      onmousedown="ab('tri',1)" onmouseup="ab('tri',0)">
      <div class="btn-icon">△</div>
      <div class="btn-lbl">УДАР</div>
    </button>
    <!-- Cross - bottom - PASS -->
    <button class="action-btn btn-cross" id="btnCross"
      ontouchstart="ab('cross',1)" ontouchend="ab('cross',0)"
      onmousedown="ab('cross',1)" onmouseup="ab('cross',0)">
      <div class="btn-icon">✕</div>
      <div class="btn-lbl">ПАС</div>
    </button>
    <!-- Square - left - TACKLE -->
    <button class="action-btn btn-square" id="btnSquare"
      ontouchstart="ab('sq',1)" ontouchend="ab('sq',0)"
      onmousedown="ab('sq',1)" onmouseup="ab('sq',0)">
      <div class="btn-icon">□</div>
      <div class="btn-lbl">ОТБОР</div>
    </button>
    <!-- Circle - right - SWITCH -->
    <button class="action-btn btn-circle" id="btnCircle"
      ontouchstart="ab('circle',1)" ontouchend="ab('circle',0)"
      onmousedown="ab('circle',1)" onmouseup="ab('circle',0)">
      <div class="btn-icon">○</div>
      <div class="btn-lbl">СМЕНА</div>
    </button>
  </div>
</div>

<script>
// ── CANVAS SETUP ──
const cv = document.getElementById('gc');
const cx = cv.getContext('2d');

function resize(){
  const w = cv.parentElement;
  cv.width = w.clientWidth;
  cv.height = w.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// ── INPUT STATE ──
const K = {U:0,D:0,L:0,R:0,tri:0,cross:0,sq:0,circle:0,L1:0,L2:0,R1:0,R2:0};

function dp(k,v){
  K[k]=v;
  const el=document.getElementById('d'+k);
  if(el) v?el.classList.add('pressed'):el.classList.remove('pressed');
}
function ab(k,v){
  K[k]=v;
  const map={tri:'btnTri',cross:'btnCross',sq:'btnSquare',circle:'btnCircle'};
  const el=document.getElementById(map[k]);
  if(el) v?el.classList.add('pressed'):el.classList.remove('pressed');
  // Instant actions on press
  if(v===1 && gameState==='playing'){
    if(k==='cross') doPass();
    if(k==='circle') switchPlayer();
    if(k==='sq') doTackle();
  }
}
function sh(k,v){
  K[k]=v;
  const el=document.getElementById('btn'+k);
  if(el) v?el.classList.add('pressed'):el.classList.remove('pressed');
}

// Keyboard
const kmap={ArrowUp:'U',ArrowDown:'D',ArrowLeft:'L',ArrowRight:'R',' ':'tri','z':'cross','x':'sq','c':'circle','q':'L1','w':'L2','e':'R2','r':'R1'};
document.addEventListener('keydown',e=>{
  const k=kmap[e.key];
  if(k){ K[k]=1; if(k==='cross'&&gameState==='playing')doPass(); if(k==='circle'&&gameState==='playing')switchPlayer(); if(k==='sq'&&gameState==='playing')doTackle(); }
  e.preventDefault();
});
document.addEventListener('keyup',e=>{ const k=kmap[e.key]; if(k) K[k]=0; });

// ── GAME STATE ──
let gameState='menu'; // menu playing goal gameover
let scoreP=0, scoreC=0;
let timeLeft=180;
let timerInt=null;
let raf=null;
let power=0, charging=false;
let goalCooldown=0;
let switchCooldown=0;
let passCooldown=0;

// FIELD
let FX,FY,FW,FH,GW,GH,GD;
function calcField(){
  const W=cv.width,H=cv.height;
  FX=W*0.03; FY=H*0.03;
  FW=W*0.94; FH=H*0.94;
  GW=FW*0.36; GH=FH*0.22;
  GD=FW*0.05;
}

// PLAYERS
let players=[]; // all 4
let controlled=0; // index of player user controls (0 or 1)
let ball={};

function makePlayer(x,y,shirt,pants,skin,hair,isEnemy,role,num){
  return {x,y,vx:0,vy:0,shirt,pants,skin,hair,isEnemy,role,num,
    w:0,h:0, // set in calcSizes
    anim:0,kick:0,tackle:0,celebrate:0,
    facingRight:!isEnemy,
    hasBall:false,
    passTarget:false,
  };
}

function calcSizes(){
  const W=cv.width,H=cv.height;
  for(const p of players){
    p.h=Math.min(W,H)*0.11;
    p.w=p.h*0.55;
  }
  ball.r=Math.min(W,H)*0.023;
}

function initGame(){
  calcField();
  ball={x:FX+FW/2,y:FY+FH/2,vx:0,vy:0,z:0,vz:0,spin:0,r:0};
  players=[
    makePlayer(FX+FW*0.12,FY+FH*0.5, '#1a5fc8','#fff','#f5cba7','#1a1a1a',false,'GK',1),
    makePlayer(FX+FW*0.35,FY+FH*0.5, '#1a5fc8','#fff','#f5cba7','#2a1a0a',false,'FW',9),
    makePlayer(FX+FW*0.88,FY+FH*0.5, '#c82020','#111','#f0c090','#5a1a1a',true,'GK',1),
    makePlayer(FX+FW*0.65,FY+FH*0.5, '#c82020','#111','#f0c090','#8B0000',true,'FW',9),
  ];
  controlled=1; // start with FW
  calcSizes();
}

// ── DRAWING ──

function drawField(){
  const W=cv.width,H=cv.height;
  // BG
  cx.fillStyle='#060b14'; cx.fillRect(0,0,W,H);
  // Grass
  const g=cx.createLinearGradient(FX,FY,FX,FY+FH);
  g.addColorStop(0,'#16521c');g.addColorStop(0.5,'#1a6020');g.addColorStop(1,'#124018');
  cx.fillStyle=g;
  rr(cx,FX,FY,FW,FH,5); cx.fill();
  // Stripes
  const ns=10, sw=FW/ns;
  for(let i=0;i<ns;i++){
    if(i%2===0){cx.fillStyle='rgba(0,0,0,0.06)';cx.fillRect(FX+i*sw,FY,sw,FH);}
  }
  // Lines
  cx.strokeStyle='rgba(255,255,255,0.45)';cx.lineWidth=1.5;
  cx.strokeRect(FX+1,FY+1,FW-2,FH-2);
  // Center line
  cx.beginPath();cx.moveTo(FX+FW/2,FY);cx.lineTo(FX+FW/2,FY+FH);cx.stroke();
  // Center circle
  cx.beginPath();cx.arc(FX+FW/2,FY+FH/2,FH*0.15,0,Math.PI*2);cx.stroke();
  // Center dot
  cx.fillStyle='rgba(255,255,255,0.5)';cx.beginPath();cx.arc(FX+FW/2,FY+FH/2,2.5,0,Math.PI*2);cx.fill();
  // Penalty areas
  const pW=FW*0.15,pH=FH*0.5;
  cx.strokeRect(FX,FY+(FH-pH)/2,pW,pH);
  cx.strokeRect(FX+FW-pW,FY+(FH-pH)/2,pW,pH);
  // Small areas
  const sW=FW*0.07,sH=FH*0.3;
  cx.strokeRect(FX,FY+(FH-sH)/2,sW,sH);
  cx.strokeRect(FX+FW-sW,FY+(FH-sH)/2,sW,sH);
  // Goals
  drawGoal(FX,FY+(FH-GH)/2, true);
  drawGoal(FX+FW,FY+(FH-GH)/2, false);
}

function drawGoal(x,gy,isLeft){
  const depth=isLeft?-GD:GD;
  // Net fill
  cx.fillStyle='rgba(255,255,255,0.04)';
  cx.fillRect(isLeft?x+depth:x, gy, GD, GH);
  // Posts
  cx.strokeStyle='rgba(255,255,255,0.85)';cx.lineWidth=3;
  cx.beginPath();cx.moveTo(x,gy);cx.lineTo(x,gy+GH);cx.stroke();
  cx.lineWidth=2;
  cx.beginPath();cx.moveTo(x,gy);cx.lineTo(x+depth,gy);cx.lineTo(x+depth,gy+GH);cx.lineTo(x,gy+GH);cx.stroke();
  // Net grid
  cx.strokeStyle='rgba(255,255,255,0.12)';cx.lineWidth=0.7;
  for(let i=1;i<5;i++){cx.beginPath();cx.moveTo(x,gy+i*GH/5);cx.lineTo(x+depth,gy+i*GH/5);cx.stroke();}
  for(let i=1;i<3;i++){cx.beginPath();cx.moveTo(x+depth*i/3,gy);cx.lineTo(x+depth*i/3,gy+GH);cx.stroke();}
}

function drawPlayer(p, isControlled){
  const {x,y,h,w,shirt,pants,skin,hair,facingRight,kick,tackle,celebrate,anim} = p;
  const dir=facingRight?1:-1;
  cx.save();
  cx.translate(x,y);

  // Shadow
  cx.save();cx.scale(1,0.28);
  cx.fillStyle='rgba(0,0,0,0.32)';
  cx.beginPath();cx.ellipse(0,h*0.52,w*0.45,w*0.2,0,0,Math.PI*2);cx.fill();
  cx.restore();

  const phase=anim;
  const ls=Math.sin(phase)*(tackle>0?0.1:0.38);
  const rs=-ls+(kick>0?0.9:0)+(tackle>0?0.5:0);
  const as=Math.sin(phase+Math.PI)*0.22;
  const legLen=h*0.33;
  const legW=w*0.14;
  const armLen=h*0.25;
  const armW=w*0.1;
  const bW=w*0.54;
  const bodyTop=-h*0.18;

  // LEFT LEG
  cx.save();cx.translate(-w*0.1,h*0.16);cx.rotate(ls);
  cx.fillStyle=shirt;cx.fillRect(-legW/2,0,legW,legLen*0.5);
  cx.fillStyle='#ffffff';cx.fillRect(-legW/2+1,legLen*0.5,legW-2,legLen*0.42);
  cx.fillStyle='#111';
  const bootDir=facingRight?1:-1;
  cx.fillRect(-legW/2,legLen*0.9,legW*1.5*bootDir,legLen*0.13);
  cx.restore();

  // RIGHT LEG
  cx.save();cx.translate(w*0.1,h*0.16);cx.rotate(rs);
  cx.fillStyle=shirt;cx.fillRect(-legW/2,0,legW,legLen*0.5);
  cx.fillStyle='#ffffff';cx.fillRect(-legW/2+1,legLen*0.5,legW-2,legLen*0.42);
  cx.fillStyle='#111';
  cx.fillRect(-legW/2-legW*0.5*bootDir,legLen*0.9,legW*1.5,legLen*0.13);
  cx.restore();

  // BODY
  const bodyGrad=cx.createLinearGradient(-bW/2,bodyTop,bW/2,bodyTop+h*0.34);
  bodyGrad.addColorStop(0,lighten(shirt,20));
  bodyGrad.addColorStop(1,shirt);
  cx.fillStyle=bodyGrad;
  rr(cx,-bW/2,bodyTop,bW,h*0.34,4);cx.fill();

  // Shirt number
  cx.fillStyle='rgba(255,255,255,0.85)';
  cx.font=`bold ${h*0.1}px Rajdhani`;
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(p.num,0,bodyTop+h*0.17);

  // LEFT ARM
  cx.save();cx.translate(-bW/2+armW/2,bodyTop+h*0.04);cx.rotate(-as-0.18);
  cx.fillStyle=shirt;cx.fillRect(-armW/2,0,armW,armLen*0.55);
  cx.fillStyle=skin;cx.fillRect(-armW/2,armLen*0.55,armW,armLen*0.45);
  if(p.role==='GK'){cx.fillStyle='#ffd600';cx.beginPath();cx.arc(0,armLen*0.9,armW*0.9,0,Math.PI*2);cx.fill();}
  cx.restore();

  // RIGHT ARM
  cx.save();cx.translate(bW/2-armW/2,bodyTop+h*0.04);cx.rotate(as+0.18);
  cx.fillStyle=shirt;cx.fillRect(-armW/2,0,armW,armLen*0.55);
  cx.fillStyle=skin;cx.fillRect(-armW/2,armLen*0.55,armW,armLen*0.45);
  if(p.role==='GK'){cx.fillStyle='#ffd600';cx.beginPath();cx.arc(0,armLen*0.9,armW*0.9,0,Math.PI*2);cx.fill();}
  cx.restore();

  // NECK
  cx.fillStyle=skin;cx.fillRect(-w*0.09,bodyTop-h*0.08,w*0.18,h*0.1);

  // HEAD
  const hR=w*0.24;
  const headY=bodyTop-h*0.28;
  // Head shape
  cx.fillStyle=skin;
  cx.beginPath();cx.ellipse(0,headY,hR,hR*1.1,0,0,Math.PI*2);cx.fill();
  // Ear
  cx.beginPath();cx.ellipse(-dir*hR*0.92,headY,hR*0.15,hR*0.2,0,0,Math.PI*2);cx.fill();
  // Hair
  cx.fillStyle=hair;
  cx.beginPath();cx.ellipse(0,headY-hR*0.35,hR*0.98,hR*0.55,0,Math.PI,0);cx.fill();
  // Side hair
  cx.beginPath();cx.ellipse(-hR*0.75,headY-hR*0.1,hR*0.28,hR*0.38,0.3,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(hR*0.75,headY-hR*0.1,hR*0.28,hR*0.38,-0.3,0,Math.PI*2);cx.fill();

  // Eyes
  const eyeX=dir*hR*0.32;
  cx.fillStyle='#fff';cx.beginPath();cx.ellipse(eyeX,headY,hR*0.19,hR*0.13,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#0a0a40';cx.beginPath();cx.arc(eyeX+dir*hR*0.05,headY,hR*0.09,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.7)';cx.beginPath();cx.arc(eyeX+dir*hR*0.08-hR*0.03,headY-hR*0.04,hR*0.035,0,Math.PI*2);cx.fill();

  // Eyebrow
  cx.strokeStyle=hair;cx.lineWidth=1.2;
  cx.beginPath();cx.moveTo(eyeX-hR*0.18,headY-hR*0.16);cx.lineTo(eyeX+hR*0.18,headY-hR*0.18);cx.stroke();

  // Mouth
  cx.strokeStyle='rgba(0,0,0,0.4)';cx.lineWidth=1;
  cx.beginPath();cx.arc(dir*hR*0.1,headY+hR*0.2,hR*0.12,0.15,Math.PI-0.15);cx.stroke();

  // Nose
  cx.strokeStyle=darken(skin,20);cx.lineWidth=1;
  cx.beginPath();cx.moveTo(dir*hR*0.22,headY-hR*0.05);cx.lineTo(dir*hR*0.28,headY+hR*0.1);cx.stroke();

  // CONTROL INDICATOR
  if(isControlled){
    cx.fillStyle='#00e676';
    cx.beginPath();
    cx.moveTo(-6,bodyTop-h*0.48);
    cx.lineTo(6,bodyTop-h*0.48);
    cx.lineTo(0,bodyTop-h*0.42);
    cx.closePath();cx.fill();
    // Glow ring
    cx.strokeStyle='rgba(0,230,118,0.35)';cx.lineWidth=2;
    cx.beginPath();cx.arc(0,0,w*0.65,0,Math.PI*2);cx.stroke();
  }

  // Pass target indicator (enemy teammate arrow)
  if(p.passTarget){
    cx.strokeStyle='rgba(255,214,0,0.7)';cx.lineWidth=2;cx.setLineDash([3,3]);
    cx.beginPath();cx.arc(0,bodyTop-h*0.55,w*0.5,0,Math.PI*2);cx.stroke();
    cx.setLineDash([]);
  }

  // Tackle animation
  if(tackle>0){
    cx.fillStyle='rgba(255,255,255,0.15)';
    cx.beginPath();cx.ellipse(dir*w*0.5,h*0.35,w*0.7,w*0.25,0.2,0,Math.PI*2);cx.fill();
  }

  // Celebration
  if(celebrate>0){
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2+celebrate*0.12;
      const d=w*0.9+Math.sin(celebrate*0.15+i)*w*0.25;
      cx.fillStyle=`hsl(${i*45+celebrate*3},100%,60%)`;
      cx.beginPath();cx.arc(Math.cos(a)*d,Math.sin(a)*d-h*0.35,2.5,0,Math.PI*2);cx.fill();
    }
  }

  cx.restore();
}

function drawBall(){
  const {x,y,r,z,spin}=ball;
  const zOff=-z*0.35;
  // Shadow
  cx.save();cx.translate(x,y);cx.scale(1+z*0.005,0.28+z*0.005);
  cx.fillStyle=`rgba(0,0,0,${0.38-z*0.003})`;
  cx.beginPath();cx.arc(0,r,r*0.9,0,Math.PI*2);cx.fill();cx.restore();

  cx.save();cx.translate(x,y+zOff);
  // Ball sphere
  const bg=cx.createRadialGradient(-r*0.3,-r*0.3,r*0.05,0,0,r);
  bg.addColorStop(0,'#fff');bg.addColorStop(0.45,'#e5e5e5');bg.addColorStop(1,'#aaa');
  cx.fillStyle=bg;cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();
  // Patches
  cx.save();cx.rotate(spin);cx.fillStyle='#111';
  pentagon(cx,0,0,r*0.34);
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2-Math.PI/2;
    pentagon(cx,Math.cos(a)*r*0.6,Math.sin(a)*r*0.6,r*0.28);
  }
  cx.restore();
  // Shine
  const sh=cx.createRadialGradient(-r*0.38,-r*0.35,0,-r*0.1,-r*0.1,r*0.55);
  sh.addColorStop(0,'rgba(255,255,255,0.75)');sh.addColorStop(1,'rgba(255,255,255,0)');
  cx.fillStyle=sh;cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();
  cx.restore();
}

function pentagon(cx,ox,oy,r){
  cx.beginPath();
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2-Math.PI/2;
    i?cx.lineTo(ox+Math.cos(a)*r,oy+Math.sin(a)*r):cx.moveTo(ox+Math.cos(a)*r,oy+Math.sin(a)*r);
  }
  cx.closePath();cx.fill();
}

// Helpers
function rr(cx,x,y,w,h,r){
  cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);
  cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);cx.lineTo(x+r,y+h);
  cx.arcTo(x,y+h,x,y+h-r,r);cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();
}
function lighten(hex,amt){
  return adjustColor(hex,amt);
}
function darken(hex,amt){
  return adjustColor(hex,-amt);
}
function adjustColor(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
  return `rgb(${r},${g},${b})`;
}

// ── GAME LOGIC ──
let lastT=0;
let goalCooldownFrames=0;

function startGame(){
  document.getElementById('ovStart').classList.add('hidden');
  document.getElementById('ovEnd').classList.add('hidden');
  scoreP=0;scoreC=0;timeLeft=180;
  updateHUD();
  initGame();
  if(timerInt)clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(gameState!=='playing')return;
    timeLeft--;updateHUD();
    if(timeLeft<=0){clearInterval(timerInt);endGame();}
  },1000);
  gameState='playing';
  if(raf)cancelAnimationFrame(raf);
  lastT=0;
  raf=requestAnimationFrame(loop);
}

function restartGame(){startGame();}

function endGame(){
  gameState='gameover';
  const t=document.getElementById('endT'),s=document.getElementById('endS');
  if(scoreP>scoreC){t.textContent='ПОБЕДА!';t.style.color='#00e676';}
  else if(scoreC>scoreP){t.textContent='ПОРАЖЕНИЕ';t.style.color='#ff1744';}
  else{t.textContent='НИЧЬЯ';t.style.color='#ffd600';}
  s.textContent=`${scoreP} : ${scoreC}`;
  document.getElementById('ovEnd').classList.remove('hidden');
}

function loop(ts){
  if(gameState==='gameover')return;
  const dt=Math.min((ts-lastT)/1000,0.05);
  lastT=ts;
  update(dt);
  render();
  raf=requestAnimationFrame(loop);
}

function switchPlayer(){
  if(switchCooldown>0)return;
  // Toggle between player 0 (GK) and player 1 (FW)
  controlled = controlled===0 ? 1 : 0;
  switchCooldown=20;
  updateHUD();
}

function doPass(){
  if(passCooldown>0)return;
  const me=players[controlled];
  const teammate=players[controlled===0?1:0];
  // Check if near ball
  const db=dist(me,ball);
  if(db>me.w*1.6)return;
  // Pass to teammate
  const dx=teammate.x-ball.x, dy=teammate.y-ball.y;
  const d=Math.sqrt(dx*dx+dy*dy);
  const spd=250+Math.random()*60;
  ball.vx=(dx/d)*spd;
  ball.vy=(dy/d)*spd+(Math.random()-0.5)*40;
  ball.vz=20+Math.random()*30;
  ball.spin=ball.vx*0.015;
  me.kick=1;
  passCooldown=25;
  // Show pass target briefly
  teammate.passTarget=true;
  setTimeout(()=>teammate.passTarget=false,600);
}

function doTackle(){
  const me=players[controlled];
  me.tackle=1;
  // Check if near enemy and near ball
  for(let i=2;i<4;i++){
    const en=players[i];
    const de=dist(me,en);
    if(de<me.w*1.5){
      // Knock ball away
      const db=dist(en,ball);
      if(db<en.w*0.9){
        ball.vx=(Math.random()-0.5)*200;
        ball.vy=(Math.random()-0.5)*150;
        ball.vz=30;
      }
    }
  }
}

function update(dt){
  if(gameState!=='playing')return;
  calcField();
  if(!ball.r)calcSizes();

  // Cooldowns
  if(switchCooldown>0)switchCooldown--;
  if(passCooldown>0)passCooldown--;
  if(goalCooldownFrames>0){
    goalCooldownFrames--;
    for(const p of players) if(p.celebrate>0)p.celebrate--;
    if(goalCooldownFrames===0){
      document.getElementById('gFlash').classList.remove('show');
      resetAfterGoal();
    }
    return;
  }

  // PLAYER CONTROL
  const me=players[controlled];
  const sprint=K.L2||K.R2?1.65:1;
  const spd=115*sprint;

  // Power charge (△ = shoot)
  if(K.tri){
    if(!charging){charging=true;power=0;}
    power=Math.min(power+dt*110,100);
  } else {
    if(charging&&power>4){
      doShoot();
    }
    charging=false;power=0;
  }
  document.getElementById('pwFill').style.width=power+'%';
  document.getElementById('pwVal').textContent=Math.round(power);

  // Move
  let mx=0,my=0;
  if(K.L)mx=-1;
  if(K.R)mx=1;
  if(K.U)my=-1;
  if(K.D)my=1;
  if(mx!==0||my!==0){
    const mag=Math.sqrt(mx*mx+my*my);
    me.vx=mx/mag*spd; me.vy=my/mag*spd;
    me.facingRight=mx>0;
    me.anim+=dt*(sprint>1?14:9);
  } else {
    me.vx*=0.7; me.vy*=0.7;
  }
  me.x+=me.vx*dt; me.y+=me.vy*dt;
  clamp(me);

  // Kick animations decay
  if(me.kick>0)me.kick-=dt*4;
  if(me.tackle>0)me.tackle-=dt*3;

  // GK auto-behavior (player's own GK if not controlled)
  const myGK=players[0];
  if(controlled!==0){
    autoGK(myGK,dt,false);
  }

  // CPU AI
  cpuAI(dt);

  // Ball physics
  updateBall(dt);

  // Collisions with all players
  for(let i=0;i<players.length;i++){
    const p=players[i];
    if(i!==controlled) p.anim+=dt*5*(Math.abs(p.vx)+Math.abs(p.vy)>10?1:0);
    playerBallCollide(p, p.isEnemy);
  }

  // Check goal
  checkGoal();
  updateHUD();
}

function doShoot(){
  const me=players[controlled];
  const db=dist(me,ball);
  if(db>me.w*1.8)return;
  me.kick=1;
  const pwr=180+power*2.8;
  const dir=me.facingRight?1:-1;
  const lob=K.L1?1:0;
  ball.vx=dir*pwr*(0.75+Math.random()*0.25);
  ball.vy=(Math.random()-0.5)*pwr*0.35;
  if(lob){ball.vz=pwr*0.55;ball.vy=(Math.random()-0.5)*pwr*0.2;}
  ball.spin=ball.vx*0.012;
  power=0;charging=false;
}

function autoGK(gk,dt,isEnemy){
  const goalY=FY+FH/2;
  const targetY=Math.max(FY+FH*0.22,Math.min(FY+FH*0.78,ball.y));
  const diff=targetY-gk.y;
  gk.vy=diff*3.5;
  gk.y+=gk.vy*dt;
  gk.facingRight=!isEnemy;
  if(Math.abs(gk.vy)>15)gk.anim+=dt*6;
  // GK save attempt
  const db=dist(gk,ball);
  if(db<gk.w*0.95){
    const isOwnGoalSide = isEnemy ? ball.x>FX+FW*0.8 : ball.x<FX+FW*0.2;
    if(isOwnGoalSide){
      gk.kick=1;
      const dir=isEnemy?-1:1;
      ball.vx=dir*(160+Math.random()*80);
      ball.vy=(Math.random()-0.5)*100;
      ball.vz=50+Math.random()*60;
    }
  }
}

function cpuAI(dt){
  const fw=players[3], gk=players[2];
  autoGK(gk,dt,true);

  // FW chases ball
  const ang=Math.atan2(ball.y-fw.y,ball.x-fw.x);
  const db=dist(fw,ball);
  const spd=90;
  if(db>fw.w*0.5){
    fw.vx+=(Math.cos(ang)*spd-fw.vx)*dt*7;
    fw.vy+=(Math.sin(ang)*spd-fw.vy)*dt*7;
  } else {fw.vx*=0.8;fw.vy*=0.8;}
  const s=Math.sqrt(fw.vx**2+fw.vy**2);
  if(s>spd){fw.vx=fw.vx/s*spd;fw.vy=fw.vy/s*spd;}
  fw.x+=fw.vx*dt; fw.y+=fw.vy*dt;
  fw.facingRight=fw.vx<0;
  fw.anim+=dt*(s>10?9:0);
  clamp(fw);

  // CPU shoot
  if(db<fw.w*1.0 && ball.x<FX+FW*0.7){
    const chance=(0.006+0.006)*(60*dt);
    if(Math.random()<chance){
      fw.kick=1;
      const goalX=FX, goalY=FY+FH/2;
      const a=Math.atan2(goalY-ball.y,goalX-ball.x)+(Math.random()-0.5)*0.35;
      const pwr=190+Math.random()*80;
      ball.vx=Math.cos(a)*pwr;ball.vy=Math.sin(a)*pwr;
      ball.vz=Math.random()<0.25?pwr*0.3:0;
    }
  }
}

function updateBall(dt){
  ball.vx*=0.983; ball.vy*=0.983;
  ball.spin+=(ball.vx*0.018)*dt;
  ball.spin*=0.97;
  ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;
  // Z height
  if(ball.z>0||ball.vz!==0){
    ball.vz-=580*dt;
    ball.z+=ball.vz*dt;
    if(ball.z<=0){ball.z=0;ball.vz*=-0.38;if(Math.abs(ball.vz)<8)ball.vz=0;}
  }
  // Walls
  if(ball.x-ball.r<FX){ball.x=FX+ball.r;ball.vx*=-0.55;}
  if(ball.x+ball.r>FX+FW){ball.x=FX+FW-ball.r;ball.vx*=-0.55;}
  if(ball.y-ball.r<FY){ball.y=FY+ball.r;ball.vy*=-0.55;}
  if(ball.y+ball.r>FY+FH){ball.y=FY+FH-ball.r;ball.vy*=-0.55;}
}

function playerBallCollide(p, isEnemy){
  const dx=ball.x-p.x, dy=ball.y-p.y;
  const d=Math.sqrt(dx*dx+dy*dy);
  const minD=ball.r+p.w*0.4;
  if(d<minD&&d>0.1){
    const nx=dx/d,ny=dy/d;
    ball.x+=nx*(minD-d); ball.y+=ny*(minD-d);
    const spd=Math.sqrt(p.vx**2+p.vy**2);
    if(spd>8){ball.vx=nx*spd*1.4+ball.vx*0.15;ball.vy=ny*spd*1.4+ball.vy*0.15;}
    else{ball.vx+=nx*25;ball.vy+=ny*25;}
  }
}

function checkGoal(){
  if(goalCooldownFrames>0)return;
  const gy=FY+(FH-GH)/2;
  const inY=ball.y>gy+ball.r&&ball.y<gy+GH-ball.r;
  if(ball.x+ball.r>FX+FW&&inY){scoreP++;triggerGoal('ГОЛ!','#00e676');return;}
  if(ball.x-ball.r<FX&&inY){scoreC++;triggerGoal('МЯЧ!','#ff1744');}
}

function triggerGoal(txt,color){
  goalCooldownFrames=150;
  const fl=document.getElementById('gFlash');
  const gt=document.getElementById('gTxt');
  gt.textContent=txt; gt.style.color=color;
  fl.classList.add('show');
  for(const p of players) if(!p.isEnemy){p.celebrate=180;}
  updateHUD();
}

function resetAfterGoal(){
  calcField();
  ball.x=FX+FW/2;ball.y=FY+FH/2;ball.vx=0;ball.vy=0;ball.z=0;ball.vz=0;ball.spin=0;
  players[0].x=FX+FW*0.12;players[0].y=FY+FH/2;players[0].vx=0;players[0].vy=0;
  players[1].x=FX+FW*0.35;players[1].y=FY+FH/2;players[1].vx=0;players[1].vy=0;
  players[2].x=FX+FW*0.88;players[2].y=FY+FH/2;players[2].vx=0;players[2].vy=0;
  players[3].x=FX+FW*0.65;players[3].y=FY+FH/2;players[3].vx=0;players[3].vy=0;
  controlled=1;
}

function clamp(p){
  const m=p.w*0.4;
  p.x=Math.max(FX+m,Math.min(FX+FW-m,p.x));
  p.y=Math.max(FY+m,Math.min(FY+FH-m,p.y));
}

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}

function updateHUD(){
  document.getElementById('sP').textContent=scoreP;
  document.getElementById('sC').textContent=scoreC;
  const m=Math.floor(timeLeft/60),s=String(timeLeft%60).padStart(2,'0');
  document.getElementById('clock').textContent=m+':'+s;
  if(players.length>0){
    const p=players[controlled];
    document.getElementById('ctrlTag').textContent=`Управление: ${p.role==='GK'?'Вратарь':'Нападающий'} #${p.num} — ○ смена игрока`;
  }
}

function render(){
  const W=cv.width,H=cv.height;
  cx.clearRect(0,0,W,H);
  calcField();
  if(!ball.r)calcSizes();
  drawField();
  // Sort players by Y for depth
  const sorted=[...players].sort((a,b)=>a.y-b.y);
  for(const p of sorted){
    const isCtrl=!p.isEnemy&&players.indexOf(p)===controlled;
    drawPlayer(p,isCtrl);
  }
  drawBall();

  // Pass line preview
  if(K.cross&&gameState==='playing'){
    const me=players[controlled];
    const tm=players[controlled===0?1:0];
    cx.strokeStyle='rgba(255,214,0,0.5)';cx.lineWidth=1.5;cx.setLineDash([5,5]);
    cx.beginPath();cx.moveTo(ball.x,ball.y);cx.lineTo(tm.x,tm.y);cx.stroke();
    cx.setLineDash([]);
  }

  // Shoot arc preview
  if(charging&&power>10){
    const me=players[controlled];
    const dir=me.facingRight?1:-1;
    cx.strokeStyle=`rgba(255,${Math.round(255-power*2)},0,${0.4+power*0.005})`;
    cx.lineWidth=1;cx.setLineDash([4,6]);
    cx.beginPath();cx.moveTo(ball.x,ball.y);
    const pwr=180+power*2.8;
    cx.lineTo(ball.x+dir*pwr*0.25,ball.y+(Math.random()-0.5)*20);
    cx.stroke();cx.setLineDash([]);
  }
}

// Keyboard mapping also for shoulder buttons
document.addEventListener('keydown',e=>{
  const m={ArrowUp:'U',ArrowDown:'D',ArrowLeft:'L',ArrowRight:'R',' ':'tri','z':'cross','x':'sq','c':'circle','q':'L1','w':'L2','e':'R2','r':'R1'};
  const k=m[e.key];
  if(k){
    if(!K[k]){
      K[k]=1;
      if(k==='cross'&&gameState==='playing')doPass();
      if(k==='circle'&&gameState==='playing')switchPlayer();
      if(k==='sq'&&gameState==='playing')doTackle();
    } else K[k]=1;
  }
  e.preventDefault();
});
document.addEventListener('keyup',e=>{
  const m={ArrowUp:'U',ArrowDown:'D',ArrowLeft:'L',ArrowRight:'R',' ':'tri','z':'cross','x':'sq','c':'circle','q':'L1','w':'L2','e':'R2','r':'R1'};
  const k=m[e.key];if(k)K[k]=0;
});
</script>
